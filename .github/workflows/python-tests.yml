name: Python tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest pyyaml   # оставляем твои зависимости

      - name: Run tests and calculate score
        run: |
          python - <<'EOF'
          import yaml
          import subprocess
          import sys

          # Загружаем конфиг с весами задач
          with open("tests/score.yaml", encoding="utf-8") as f:
              score_conf = yaml.safe_load(f)

          total_weight = 0
          earned = 0

          for t in score_conf["tests"]:
              total_weight += t.get("weight", 1)
              try:
                  subprocess.run(
                      ["pytest", "-q", "--disable-warnings", "--maxfail=0", t["path"]],
                      check=True
                  )
                  earned += t.get("weight", 1)
              except subprocess.CalledProcessError:
                  print(f"{t['name']} failed")

          print(f"TOTAL SCORE: {earned}/{total_weight}")

          # Если нужно, чтобы галка была только при полном балле:
          if score_conf.get("require_full_score", False) and earned < total_weight:
              sys.exit(1)
          EOF
